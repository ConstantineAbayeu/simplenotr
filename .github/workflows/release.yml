name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"   # strip leading 'v' if present

          mkdir -p SimpleNotr.app/Contents/MacOS
          mkdir -p SimpleNotr.app/Contents/Resources

          cp .build/release/SimpleNotr SimpleNotr.app/Contents/MacOS/SimpleNotr
          cp Info.plist SimpleNotr.app/Contents/Info.plist

          # Stamp the version from the release tag into the bundle
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" SimpleNotr.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" SimpleNotr.app/Contents/Info.plist

      - name: Zip .app bundle
        run: |
          TAG="${{ github.event.release.tag_name }}"
          zip -r "SimpleNotr-${TAG}-macos.zip" SimpleNotr.app

      - name: Upload to release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "${TAG}" "SimpleNotr-${TAG}-macos.zip" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
